name: CI — Protección Infantil

on:
  push:
    branches: [main, setup/*, feature/*, fix/*]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend — Tests & Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./src/backend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Lint with ruff
        run: ruff check app tests

      - name: Check format with black
        run: black --check app tests

      - name: Run tests with coverage
        env:
          DATABASE_URL: sqlite:///:memory:
          REPORT_ENCRYPTION_KEY: 0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef
          SECRET_KEY: ci-test-secret-key-do-not-use-in-production
          ADMIN_ROOT_PASSWORD: ci-test-root-password
          ENVIRONMENT: testing
          REDIS_URL: ""
          ALLOWED_HOSTS: "testserver,localhost,127.0.0.1"
          CORS_ORIGINS: "http://localhost:5173"
        run: pytest --cov=app --cov-report=xml --cov-report=term-missing

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: ./src/backend/coverage.xml

  frontend:
    name: Frontend — Tests & Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./src/frontend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: ./src/frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm test

      - name: Build production bundle
        run: npm run build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: ./src/frontend/dist
