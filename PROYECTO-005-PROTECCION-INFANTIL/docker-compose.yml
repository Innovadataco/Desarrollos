services:
  postgres:
    image: postgres:16-alpine
    container_name: proteccion-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-proteccion}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme_db_2026}
      POSTGRES_DB: ${POSTGRES_DB:-proteccion}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-proteccion} -d ${POSTGRES_DB:-proteccion}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: proteccion-redis
    volumes:
      - redis_data:/data
    ports:
      - "127.0.0.1:6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  backend:
    build:
      context: ./src/backend
      dockerfile: Dockerfile
      target: production
    container_name: proteccion-backend
    environment:
      - DATABASE_URL=${DATABASE_URL:-postgresql+psycopg2://proteccion:changeme_db_2026@postgres:5432/proteccion}
      - REPORT_ENCRYPTION_KEY=${REPORT_ENCRYPTION_KEY}
      - SECRET_KEY=${SECRET_KEY}
      - ENVIRONMENT=${ENVIRONMENT:-production}
      - REDIS_URL=${REDIS_URL:-redis://redis:6379/0}
      - CORS_ORIGINS=${CORS_ORIGINS:-https://localhost}
      - ALLOWED_HOSTS=${ALLOWED_HOSTS:-localhost,127.0.0.1}
    volumes:
      - backend_uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    expose:
      - "8000"
    restart: unless-stopped

  frontend:
    build:
      context: ./src/frontend
      dockerfile: Dockerfile
    container_name: proteccion-frontend
    environment:
      - VITE_API_URL=${VITE_API_URL:-/api}
    expose:
      - "80"
    depends_on:
      - backend
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    container_name: proteccion-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
    depends_on:
      - backend
      - frontend
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  backend_uploads:
