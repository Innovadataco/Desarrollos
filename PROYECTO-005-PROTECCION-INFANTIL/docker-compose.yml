services:
  backend:
    build:
      context: ./src/backend
      dockerfile: Dockerfile
    container_name: proteccion-backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=${DATABASE_URL:-sqlite:///./proteccion.db}
      - REPORT_ENCRYPTION_KEY=${REPORT_ENCRYPTION_KEY}
      - ENVIRONMENT=${ENVIRONMENT:-development}
      - REDIS_URL=${REDIS_URL:-}
    volumes:
      - ./src/backend:/app
      - backend_data:/app/data
    working_dir: /app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    restart: unless-stopped

  frontend:
    image: node:20-slim
    container_name: proteccion-frontend
    ports:
      - "5173:5173"
    environment:
      - NODE_ENV=development
      - VITE_API_URL=http://localhost:8000
    volumes:
      - ./src/frontend:/app
      - /app/node_modules
    working_dir: /app
    command: npm run dev -- --host
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  backend_data:
